<div class="container mt-4">

  <h2>Your Cart</h2>

  <div *ngIf="cart && cart.items.length > 0; else empty">

    <div class="card mb-2" *ngFor="let item of cart.items">

      <div class="card-body d-flex justify-content-between">

        <div>
          <h5>Item ID: {{ item.itemId }}</h5>
          <p>Quantity: {{ item.quantity }}</p>
        </div>

        <button class="btn btn-danger"
                (click)="remove(item.itemId)">
          Remove
        </button>

      </div>

    </div>

    <button class="btn btn-warning mt-3" (click)="clear()">
      Clear Cart
    </button>

  </div>

  <ng-template #empty>
    <p>No items in cart</p>
  </ng-template>

</div>
