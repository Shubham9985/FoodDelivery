<div class="hero text-center p-5 rounded-4 text-white">
  <h1 class="fw-bold">Order food from your favourite restaurants 🍔</h1>
  <p class="mt-3">Fast delivery | Great taste | Best prices</p>

  <button routerLink="/restaurants" class="btn btn-light mt-3 px-4">
    Explore Restaurants
  </button>
</div>

<div class="mt-5">
  <h3 class="fw-bold mb-4">Popular Categories</h3>

  <div class="d-flex gap-4 flex-wrap">
    <div class="category-card">Pizza</div>
    <div class="category-card">Burger</div>
    <div class="category-card">Biryani</div>
    <div class="category-card">Desserts</div>
  </div>
</div>
<div class="container mt-5">

  <h3>Menu Items</h3>

  <div class="row">

    <div class="col-md-4 mb-3" *ngFor="let item of menuItems">

      <div class="card h-100">

        <div class="card-body">

          <h5>{{ item.itemName }}</h5>

          <p>{{ item.itemDescription }}</p>

          <small class="text-muted">
            {{ item.restaurantName }}
          </small>

          <h6 class="mt-2">₹ {{ item.itemPrice }}</h6>

        </div>

        <div class="card-footer">

          <button class="btn btn-primary w-100"
                  (click)="addToCart(item)">
            Add to Cart
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
