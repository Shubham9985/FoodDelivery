<div class="container mt-4">

  <h2>Menu Items</h2>

  <div class="row">

    <div class="col-md-4 mb-3" *ngFor="let item of menuItems">

      <div class="card h-100">

        <div class="card-body">

          <!-- NAME -->
          <h5>{{ item.itemName }}</h5>

          <!-- DESCRIPTION -->
          <p>{{ item.itemDescription }}</p>

          <!-- RESTAURANT -->
          <small class="text-muted">
            {{ item.restaurantName }}
          </small>

          <!-- PRICE -->
          <h6 class="mt-2">₹ {{ item.itemPrice }}</h6>

        </div>

        <div class="card-footer">

          <button class="btn btn-primary w-100"
                  (click)="addToCart(item)">
            Add to Cart
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
