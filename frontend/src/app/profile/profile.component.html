<div class="profile-container">
  <header class="navbar">
    <button class="logo-btn" routerLink="/home">
      <span class="logo-mark">🍔</span>
      <span class="logo-text">FoodieHub</span>
    </button>
    <nav>
      <button class="nav-btn" routerLink="/home">Home</button>
      <button class="nav-btn" routerLink="/cart">Cart</button>
      <button class="nav-btn" routerLink="/orders">My Orders</button>
      <button class="nav-btn" routerLink="/addresses">Addresses</button>
      <button class="nav-btn active" routerLink="/profile">Profile</button>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </nav>
  </header>

  <div class="profile-wrap">
    <h2 class="page-title">My Profile</h2>

    <div *ngIf="message" class="alert" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
      {{ message }}
    </div>

    <div *ngIf="loading" class="loading">Loading profile...</div>

    <div *ngIf="!loading && profile" class="profile-card">
      <div class="profile-header">
        <div class="avatar">{{ getInitials() }}</div>
        <div class="header-info">
          <h3>{{ profile.customerName }}</h3>
          <p>{{ profile.customerEmail }}</p>
          <span class="badge">Customer</span>
        </div>
        <button class="edit-btn" (click)="toggleEdit()" *ngIf="!editMode">✎ Edit Profile</button>
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="profile-form">
        <div class="field">
          <label>Full Name</label>
          <input type="text" formControlName="customerName" />
          <small *ngIf="profileForm.get('customerName')?.touched && profileForm.get('customerName')?.invalid">
            Name must be 2–50 characters
          </small>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" formControlName="customerEmail" />
          <small *ngIf="profileForm.get('customerEmail')?.touched && profileForm.get('customerEmail')?.invalid">
            Enter a valid email
          </small>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="tel" formControlName="customerPhone" />
          <small *ngIf="profileForm.get('customerPhone')?.touched && profileForm.get('customerPhone')?.invalid">
            Phone must be 10 digits
          </small>
        </div>

        <div class="form-actions" *ngIf="editMode">
          <button type="button" class="cancel-btn" (click)="toggleEdit()" [disabled]="saving">Cancel</button>
          <button type="submit" class="save-btn" [disabled]="saving || profileForm.invalid">
            {{ saving ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>

      <div class="quick-links">
        <h4>Quick Links</h4>
        <div class="links-grid">
          <button class="link-card" routerLink="/orders">
            <span class="link-icon">📦</span>
            <div>
              <p class="link-title">My Orders</p>
              <p class="link-sub">View order history</p>
            </div>
          </button>
          <button class="link-card" routerLink="/addresses">
            <span class="link-icon">📍</span>
            <div>
              <p class="link-title">Addresses</p>
              <p class="link-sub">Manage delivery addresses</p>
            </div>
          </button>
          <button class="link-card" routerLink="/cart">
            <span class="link-icon">🛒</span>
            <div>
              <p class="link-title">Cart</p>
              <p class="link-sub">Review your cart</p>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
